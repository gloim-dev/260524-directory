<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gloim Directory Dashboard v4.4 (Converter Update)</title>
  
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <style>
    /* ==========================================================================
       1. 디자인 시스템 코어 변수 & 테마 엔진 (SaaS Elevation Spec)
       ========================================================================== */
    :root {
      /* 다크 테마 (SaaS Dark Core - Google Premium Dark Mode 표준) */
      --bg-color: #080b11;
      --sidebar-bg: rgba(13, 18, 30, 0.75);
      --card-bg: rgba(20, 27, 45, 0.45);
      --card-border: rgba(255, 255, 255, 0.04);
      --card-border-hover: rgba(59, 130, 246, 0.3);
      --shadow-sm: rgba(0, 0, 0, 0);
      
      --text-main: #f3f4f6;
      --text-muted: #8c93a3;
      --accent-color: #3b82f6; 
      --accent-glow: rgba(59, 130, 246, 0.15);
      
      --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      
      --input-bg: #070a12;
      --modal-bg: #0f1422;
      --memo-input-border: rgba(255, 255, 255, 0.05);
      --transition-smooth: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    [data-theme="light"] {
      /* 라이트 테마 (High-Contrast SaaS Light) */
      --bg-color: #f8fafc;            
      --sidebar-bg: #ffffff;          
      --card-bg: #ffffff;             
      --card-border: rgba(15, 23, 42, 0.06);
      --card-border-hover: rgba(37, 99, 235, 0.4);
      --shadow-sm: 0 1px 3px rgba(15, 23, 42, 0.03), 0 4px 12px rgba(15, 23, 42, 0.04);
      
      --text-main: #0f172a;           
      --text-muted: #64748b;          
      
      --input-bg: #f1f5f9;
      --modal-bg: #ffffff;
      --memo-input-border: rgba(15, 23, 42, 0.08);
    }

    /* ==========================================================================
       2. 글로벌 브라우저 정규화 & 베이스 커널
       ========================================================================== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: var(--font-main);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    html {
      scroll-behavior: smooth;
      text-size-adjust: 100%;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      overflow: hidden; 
      position: relative;
      min-height: 100vh;
      transition: background-color 0.2s ease, color 0.2s ease;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* ==========================================================================
       3. 레이아웃 & 내비게이션 프레임워크 (Glassmorphism 프레임)
       ========================================================================== */
    .dashboard-wrapper {
      display: flex;
      position: relative;
      z-index: 1;
      height: 100vh;
      width: 100vw;
    }

    .sidebar {
      width: 280px;
      background: var(--sidebar-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-right: 1px solid var(--card-border);
      padding: 32px 20px;
      display: flex;
      flex-direction: column;
      gap: 32px;
      flex-shrink: 0;
      box-shadow: var(--shadow-sm);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-left: 6px;
    }
    .logo-text {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 2px;
      background: linear-gradient(135deg, var(--text-main) 0%, var(--text-muted) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .badge {
      font-size: 10px;
      background: rgba(59, 130, 246, 0.12);
      color: var(--accent-color);
      border: 1px solid rgba(59, 130, 246, 0.25);
      padding: 1px 5px;
      border-radius: 4px;
      font-weight: 700;
    }

    .nav-menu {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    /* 🛠️ [UX 1안 반영] 영역 분리형 내비게이션 아이템 그리드 레일 */
    .split-nav-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-radius: 8px;
      transition: var(--transition-smooth);
    }

    .split-nav-container.active {
      background: rgba(59, 130, 246, 0.08);
      border: 1px solid rgba(59, 130, 246, 0.15);
    }

    .split-nav-left-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 0 11px 14px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      flex: 1;
      transition: var(--transition-smooth);
    }
    .split-nav-left-link i { font-size: 18px; }

    .split-nav-container:hover .split-nav-left-link,
    .split-nav-container.active .split-nav-left-link {
      color: var(--text-main);
    }
    .split-nav-container.active .split-nav-left-link {
      color: var(--accent-color);
      font-weight: 600;
    }

    /* 독립된 우측 화살표 트리거 스펙 */
    .sidebar-accordion-trigger-box {
      padding: 11px 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-muted);
      transition: var(--transition-smooth);
    }
    .sidebar-accordion-trigger-box:hover {
      color: var(--text-main);
    }
    .sidebar-chevron-icon {
      font-size: 13px;
      transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* 아코디언 하위 메뉴 래퍼 시스템 */
   .sidebar-sub-panel-list {
  list-style: none;
  padding-left: 32px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  margin-top: 8px;    /* ◀ 기존 2px에서 12px로 변경하여 대메뉴 하단 여백을 확보 */
  margin-bottom: 8px; /* (이전 수정본 유지) */
  overflow: hidden;
  transition: max-height 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  max-height: 500px;
}
    
    /* 서브 리스트 항목 정밀 마감 */
    .sub-panel-node-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      border-radius: 6px;
      cursor: pointer;
      transition: var(--transition-smooth);
    }
    .sub-panel-node-item i { font-size: 15px; }
    .sub-panel-node-item:hover {
      color: var(--text-main);
      background: rgba(59, 130, 246, 0.05);
    }

    /* 접힘 상태 클래스 엔지니어링 */
    .split-nav-group.is-collapsed .sidebar-sub-panel-list {
      max-height: 0px;
    }
    .split-nav-group.is-collapsed .sidebar-chevron-icon {
      transform: rotate(-90deg);
    }

    /* 하단 고정 개인달력 단독 레일 링크 */
    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 14px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: var(--transition-smooth);
    }
    .nav-item i { font-size: 18px; }
    .nav-item:hover {
      color: var(--text-main);
      background: rgba(59, 130, 246, 0.05);
    }

    /* ==========================================================================
       4. 실시간 퀵 메모 마이크로 위젯
       ========================================================================== */
    .mini-widget {
      margin-top: auto;
      background: rgba(255, 255, 255, 0.01);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    [data-theme="light"] .mini-widget { background: #f8fafc; }

    .mini-widget h3 {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .memo-input-container {
      display: flex;
      flex-direction: column;
      background: rgba(0, 0, 0, 0.15);
      border: 1px solid var(--memo-input-border);
      border-radius: 8px;
      padding: 10px 12px;
      gap: 8px;
      position: relative;
      transition: border-color 0.2s ease;
    }
    [data-theme="light"] .memo-input-container { background: #ffffff; }
    .memo-input-container:focus-within {
      border-color: var(--accent-color);
    }

    .memo-input-container textarea {
      width: 100%;
      height: 64px;                 
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-main);
      font-size: 13.5px;              
      line-height: 1.5;
      resize: none;                 
    }
    .memo-input-container textarea::placeholder { color: var(--text-muted); }

    .memo-control-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--card-border);
      padding-top: 8px;
    }
    .memo-tip {
      font-size: 10px;
      color: var(--text-muted);
    }
    .memo-add-btn {
      background: transparent;
      border: none;
      color: var(--accent-color);
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      transition: transform 0.1s ease;
    }
    .memo-add-btn:active { transform: scale(0.9); }

    .memo-list-wrapper {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 180px;
      overflow-y: auto;
      padding-right: 2px;
    }
    .memo-list-wrapper::-webkit-scrollbar { width: 4px; }
    .memo-list-wrapper::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 2px; }

    .memo-item {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      box-shadow: var(--shadow-sm);
      transition: var(--transition-smooth);
    }
    .memo-item:hover {
      transform: translateY(-1px);
    }
    .memo-item.completed {
      opacity: 0.45;
    }
    .memo-item.completed .memo-text-content {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .memo-left-block {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      width: 100%;
    }

    .memo-checkbox {
      color: var(--text-muted);
      cursor: pointer;
      font-size: 16px;
      margin-top: 2px;
      flex-shrink: 0;
      transition: color 0.15s ease;
    }
    .memo-item.completed .memo-checkbox { color: #10b981; }

    .memo-text-content {
      font-size: 13.5px;              
      color: var(--text-main);
      line-height: 1.45;
      word-break: break-all;
      white-space: pre-wrap;        
    }

    .memo-action-btns {
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }
    .memo-del-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      transition: color 0.15s ease;
    }
    .memo-del-btn:hover { color: #ef4444; }

    /* ==========================================================================
       5. 메인 스페이스 워크스페이스 & 탑 캘린더 헤더 바 (정밀 수평 마감)
       ========================================================================== */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .main-header {
      height: 72px;
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--card-border);
      flex-shrink: 0;
    }

    .search-bar-container {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--card-border);
      padding: 8px 14px;
      border-radius: 18px;
      width: 340px;
      transition: var(--transition-smooth);
    }
    [data-theme="light"] .search-bar-container { background: rgba(15, 23, 42, 0.04); }
    .search-bar-container:focus-within {
      border-color: rgba(59, 130, 246, 0.4);
      background: rgba(0, 0, 0, 0.02);
      box-shadow: 0 0 0 3px rgba(5b, 130, 246, 0.12);
    }
    .search-icon { color: var(--text-muted); font-size: 16px; }
    #search-input {
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-main);
      width: 100%;
      font-size: 13.5px;
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn-theme-toggle {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      color: var(--text-main);
      width: 34px;
      height: 34px;
      border-radius: 50%;
      
      display: inline-flex !important;      
      align-items: center !important;        
      justify-content: center !important;    
      
      cursor: pointer;
      padding: 0 !important;                 
      font-size: 16px !important;            
      transition: var(--transition-smooth);
      box-shadow: var(--shadow-sm);
    }

    .btn-theme-toggle i,
    .btn-theme-toggle svg {
      display: inline-flex !important;
      align-items: center !important;
      justify-content: center !important;
      vertical-align: middle !important;
      margin: 0 !important;
      padding: 0 !important;
      height: 16px !important;
      width: 16px !important;
      line-height: 1 !important;
    }

    .btn-theme-toggle:hover {
      border-color: var(--accent-color);
      transform: scale(1.05);
      background: rgba(59, 130, 246, 0.05);
    }

    .info-clock-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--card-border);
      padding: 5px 14px;
      border-radius: 30px;
      user-select: none;
      height: 34px;               
    }
    [data-theme="light"] .info-clock-wrapper { background: rgba(15, 23, 42, 0.04); }

    #live-date {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--text-main);
      letter-spacing: -0.2px;
    }
    #live-clock {
      font-family: var(--font-mono);
      font-variant-numeric: tabular-nums; 
      font-weight: 500;
      color: var(--text-muted);
      font-size: 12.5px;
      border-left: 1px solid var(--card-border);
      padding-left: 8px;
    }

    .scroll-container {
      flex: 1;
      overflow-y: auto;
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 40px;
    }
    .scroll-container::-webkit-scrollbar { width: 6px; }
    .scroll-container::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 3px; }
    [data-theme="dark"] .scroll-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); }

    /* ==========================================================================
       6. 디렉토리 그리드 아키텍처 & 아코디언 컴파일 스펙
       ========================================================================== */
    .directory-section {
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-margin-top: 24px; 
      will-change: transform, opacity; 
    }

    .section-title-wrapper {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
      padding: 4px 0;
    }
    .title-left-box {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-main);
      letter-spacing: -0.2px;
    }
    .accordion-toggle-icon {
      font-size: 14px;
      color: var(--text-muted);
      transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .section-title-wrapper:hover .accordion-toggle-icon { color: var(--text-main); }

    .accordion-body-container {
      opacity: 1;
      transform-origin: top center;
      transition: opacity 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .directory-section.is-collapsed .accordion-body-container {
      display: none;
      opacity: 0;
    }

    /* ==========================================================================
       7. 하이엔드 카드 시스템 (Micro Radial Glow 구현)
       ========================================================================== */
    .quick-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
    }
    .directory-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 12px;
    }

    .quick-card, .link-card {
      position: relative;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      overflow: visible; 
      box-shadow: var(--shadow-sm);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: background 0.2s, border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    }
    .quick-card { flex-direction: row; align-items: center; gap: 14px; cursor: pointer; }
    .link-card { cursor: pointer; }

    .card-glow {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(400px circle at var(--mouse-x, 0px) var(--mouse-y, 0px), rgba(59, 130, 246, 0.05), transparent 50%);
      z-index: 1;
      pointer-events: none;
      border-radius: inherit;
    }
    .quick-card *, .link-card * { position: relative; z-index: 2; }

    .quick-icon, .card-icon {
      width: 36px;
      height: 36px;
      background: rgba(59, 130, 246, 0.05);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: var(--accent-color);
      flex-shrink: 0;
    }
    .quick-info h3, .card-body h3 { font-size: 14px; font-weight: 600; margin-bottom: 2px; color: var(--text-main); }
    .quick-info p, .card-body p { font-size: 12.5px; color: var(--text-muted); line-height: 1.4; }

    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .link-arrow { color: var(--text-muted); font-size: 14px; opacity: 0; transform: translate(-3px, 3px); transition: var(--transition-smooth); }
    .link-card:hover:not(.add-card-placeholder) .link-arrow { opacity: 1; transform: translate(0, 0); color: var(--text-main); }

    .card-tags { display: flex; gap: 4px; margin-top: 14px; flex-wrap: wrap; }
    .tag { font-size: 10.5px; background: rgba(59, 130, 246, 0.05); border: 1px solid var(--card-border); padding: 2px 6px; border-radius: 4px; color: var(--text-muted); font-weight: 500; }

    .quick-card:hover, .link-card:hover:not(.add-card-placeholder) {
      border-color: var(--card-border-hover);
      transform: translateY(-2px);
      box-shadow: var(--shadow-sm), 0 10px 20px -10px var(--accent-glow);
    }

    /* ==========================================================================
       8. 개인화 편집 엔진 & 삭제/추가 플레이스홀더 마감 스펙
       ========================================================================== */
    .btn-edit-control {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent-color);
      background: rgba(59, 130, 246, 0.05);
      border: 1px solid rgba(59, 130, 246, 0.15);
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: var(--transition-smooth);
    }
    .btn-edit-control:hover { background: var(--accent-color); color: white; }
    .btn-edit-control.editing-active { background: #ef4444; border-color: #ef4444; color: white; }

    .is-editing-mode .quick-card:not(.add-card-placeholder),
    .is-editing-mode .link-card:not(.add-card-placeholder) {
      animation: wiggleCore 0.25s ease-in-out infinite alternate;
      border-color: rgba(239, 68, 68, 0.25);
      cursor: default;
    }
    @keyframes wiggleCore {
      0% { transform: rotate(-0.5deg); }
      100% { transform: rotate(0.5deg); }
    }

    .card-inline-delete-btn {
      position: absolute;
      top: -6px;                 
      right: -6px;
      background: #ef4444;
      color: white;
      border-radius: 50%;
      width: 22px;               
      height: 22px;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      cursor: pointer;
      z-index: 90;              
      border: 2px solid var(--bg-color);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.35);
      transition: background 0.15s, transform 0.15s;
    }
    .card-inline-delete-btn:hover { background: #dc2626; transform: scale(1.1); }
    .is-editing-mode .card-inline-delete-btn { display: flex; }

    .add-card-placeholder {
      border: 1px dashed rgba(59, 130, 246, 0.3);
      background: rgba(59, 130, 246, 0.01);
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
      cursor: pointer;
      gap: 6px;
    }
    .quick-grid .add-card-placeholder { min-height: 58px; border-radius: 10px; }
    .directory-grid .add-card-placeholder { min-height: 120px; border-radius: 10px; flex-direction: column; padding: 20px; }
    .add-card-placeholder:hover {
      background: rgba(59, 130, 246, 0.05);
      border-color: var(--accent-color);
      color: var(--accent-color);
    }
    .is-editing-mode .add-card-placeholder { display: flex; }

    /* ==========================================================================
       9. 인프라 대화형 프리미엄 모달 팝업 시스템
       ========================================================================== */
    .custom-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(5, 7, 12, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 999;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .custom-modal-box {
      background: var(--modal-bg);
      border: 1px solid var(--card-border);
      width: 440px;
      max-width: 90vw;
      border-radius: 14px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    }
    .modal-input-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .modal-input-item label { font-size: 11.5px; color: var(--text-muted); font-weight: 600; }
    .modal-input-item input {
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      padding: 10px 12px;
      border-radius: 6px;
      color: var(--text-main);
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s ease;
    }
    .modal-input-item input:focus { border-color: var(--accent-color); }

    .icon-selector-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }
    .icon-opt {
      border: 1px solid var(--card-border);
      border-radius: 6px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      cursor: pointer;
      color: var(--text-muted);
      transition: var(--transition-smooth);
    }
    .icon-opt:hover { color: var(--text-main); background: rgba(255,255,255,0.02); }
    .icon-opt.selected {
      border-color: var(--accent-color);
      color: var(--accent-color);
      background: rgba(59, 130, 246, 0.05);
    }

    .modal-action-footer {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }
    .modal-action-footer button {
      flex: 1;
      height: 44px;
      border-radius: 8px;
      font-size: 13.5px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      outline: none;
      transition: var(--transition-smooth);
    }
    .btn-cancel { background: rgba(255,255,255,0.05); color: var(--text-muted); }
    .btn-cancel:hover { background: rgba(255,255,255,0.1); color: var(--text-main); }
    .btn-submit { background: var(--accent-color); color: #ffffff; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2); }
    .btn-submit:hover { background: #1d4ed8; transform: translateY(-1px); box-shadow: 0 6px 16px rgba(59, 130, 246, 0.35); }
    .btn-submit:active { transform: translateY(0); }
  </style>
</head>
<body data-theme="light">

  <div class="custom-modal-overlay" id="service-modal">
    <div class="custom-modal-box">
      <h3 style="font-size: 15px; font-weight: 700; color: var(--text-main); display:flex; align-items:center; gap:6px;"><i class="ph ph-plus-circle-bold" style="color: var(--accent-color);"></i> 인프라 서비스 커스텀 등록</h3>
      
      <div class="modal-input-item">
        <label>서비스 명칭</label>
        <input type="text" id="modal-input-name" placeholder="예: Slack, Notion, Jira">
      </div>
      
      <div class="modal-input-item">
        <label>서비스 간략 설명</label>
        <input type="text" id="modal-input-desc" placeholder="예: 마케팅 성과 대시보드 리포팅 채널">
      </div>

      <div class="modal-input-item">
        <label>연결 주소 (URL)</label>
        <input type="text" id="modal-input-url" placeholder="https://example.com" value="https://">
      </div>

      <div class="modal-input-item" id="modal-tag-input-group">
        <label>검색용 태그 지정 (쉼표 ',' 기호로 다중 구분)</label>
        <input type="text" id="modal-input-tags" placeholder="예: 디자인, 협업, 업무 (공백없이)">
      </div>

      <div class="modal-input-item">
        <label>대표 아이콘 지정</label>
        <div class="icon-selector-row">
          <div class="icon-opt selected" onclick="selectModalIcon(this, 'ph-link')"><i class="ph ph-link"></i></div>
          <div class="icon-opt" onclick="selectModalIcon(this, 'ph-browser')"><i class="ph ph-browser"></i></div>
          <div class="icon-opt" onclick="selectModalIcon(this, 'ph-chat-circle')"><i class="ph ph-chat-circle"></i></div>
          <div class="icon-opt" onclick="selectModalIcon(this, 'ph-kanban')"><i class="ph ph-kanban"></i></div>
          <div class="icon-opt" onclick="selectModalIcon(this, 'ph-hard-drives')"><i class="ph ph-hard-drives"></i></div>
        </div>
      </div>

      <div class="modal-action-footer">
        <button type="button" class="btn-cancel" onclick="closeServiceModal()">취소</button>
        <button type="button" class="btn-submit" onclick="commitCustomService()">시스템 등록</button>
      </div>
    </div>
  </div>

  <div class="dashboard-wrapper">
    
    <aside class="sidebar">
      <div class="brand">
        <span class="logo-text">GLOIM</span>
        <span class="badge">OS</span>
      </div>
      
      <nav class="nav-menu">
        
        <div class="split-nav-group" id="dash-accordion-group">
          <div class="split-nav-container active">
            <div class="split-nav-left-link" onclick="location.href='index.html'">
              <i class="ph ph-squares-four"></i>
              <span>대시보드</span>
            </div>
            <div class="sidebar-accordion-trigger-box" onclick="event.stopPropagation(); toggleDashboardAccordion();">
              <i class="ph ph-caret-down sidebar-chevron-icon"></i>
            </div>
          </div>
          
          <ul class="sidebar-sub-panel-list">
            <li class="sub-panel-node-item" onclick="scrollToSection('marketing')"><i class="ph ph-chart-bar"></i> 마케팅 & SEO</li>
            <li class="sub-panel-node-item" onclick="scrollToSection('design-dev')"><i class="ph ph-paint-brush-broad"></i> 디자인 & 개발</li>
            <li class="sub-panel-node-item" onclick="scrollToSection('operation')"><i class="ph ph-briefcase"></i> 업무 & 관리</li>

          <i class="ph ph-calendar-blank"></i> 개인달력

      <div class="mini-widget memo-widget">
        <h3><i class="ph ph-note-blank" style="color: var(--accent-color);"></i> 실시간 퀵 메모</h3>
        <div class="memo-input-container">
          <textarea id="memo-textarea-field" placeholder="새 메모를 자유롭게 입력하세요...&#10;(줄바꿈 Shift + Enter / 저장 Enter)"></textarea>
          <div class="memo-control-bar">
            <span class="memo-tip">Enter로 신속 등록</span>
            <button class="memo-add-btn" onclick="pushLiveMemo()"><i class="ph ph-plus-bold"></i></button>
          </div>

        <div class="memo-list-wrapper" id="memo-render-target"></div>
      </div>

    <main class="main-content">

        <div class="header-controls">
          <button class="btn-theme-toggle" id="theme-toggle-btn" onclick="toggleSystemTheme()" title="화면 테마 변경">
            <i class="ph ph-sun"></i>
          </button>
          
          <div class="info-clock-wrapper">

          </div>

      </header>

      <div class="scroll-container" id="directory-scroll-hub">
        
        <section id="quick-access" class="directory-section">
          <div class="section-title-wrapper" onclick="toggleSectionAccordion('quick-access')">
            <div class="title-left-box">
              <i class="ph ph-caret-down accordion-toggle-icon"></i>
              <h2 class="section-title">자주 찾는 서비스</h2>
            </div>
            <button class="btn-edit-control" id="edit-mode-toggle-trigger" onclick="event.stopPropagation(); togglePersonalizationMode()">
              <i class="ph ph-sliders-bold"></i> <span>서비스 편집</span>
            </button>
          </div>
          <div class="accordion-body-container">
            <div class="quick-grid" id="quick-service-container"></div>
          </div>
        </section>

        <section id="marketing" class="directory-section">
          <div class="section-title-wrapper" onclick="toggleSectionAccordion('marketing')">
            <div class="title-left-box">
              <i class="ph ph-caret-down accordion-toggle-icon"></i>
              <h2 class="section-title">마케팅 & SEO 툴</h2>
            </div>
          </div>
          <div class="accordion-body-container">
            <div class="directory-grid" id="marketing-service-container"></div>
          </div>
        </section>

        <section id="design-dev" class="directory-section">
          <div class="section-title-wrapper" onclick="toggleSectionAccordion('design-dev')">
            <div class="title-left-box">
              <i class="ph ph-caret-down accordion-toggle-icon"></i>
              <h2 class="section-title">디자인 & 개발 레퍼런스</h2>
            </div>
          </div>
          <div class="accordion-body-container">
            <div class="directory-grid" id="designdev-service-container"></div>
          </div>
        </section>

        <section id="operation" class="directory-section">
          <div class="section-title-wrapper" onclick="toggleSectionAccordion('operation')">
            <div class="title-left-box">
              <i class="ph ph-caret-down accordion-toggle-icon"></i>
              <h2 class="section-title">업무 & 사내 시스템</h2>
            </div>
          </div>
          <div class="accordion-body-container">
            <div class="directory-grid" id="operation-service-container"></div>
          </div>
        </section>

      </div>
    </main>

  </div>

  <script>
    /* --------------------------------------------------------------------------
       1. 마스터 데이터 세팅 및 💾 로컬 스토리지 백업 허브 연동
       -------------------------------------------------------------------------- */
    const factoryDefaultStore = {
      quickAccess: [
        { id: 'quick-01', name: '다음메일', desc: '사내 주요 메일함 수신 확인', url: 'https://mail.daum.net', icon: 'ph-envelope' },
        { id: 'quick-02', name: '구글챗', desc: '팀원 간 실시간 업무 커뮤니케이션 채널', url: 'https://chat.google.com', icon: 'ph-chat-circle' },
        { id: 'quick-03', name: '글독스', desc: '통합 프로젝트 및 아카이브 문서 공간', url: 'https://docs.google.com/spreadsheets/d/1yP3qxp3ArzZqKRbZvA4H-NVvHTSEx7ilvXExnfLdy0c/edit', icon: 'ph-table' },
        { id: 'quick-04', name: '오늘계획', desc: '일일 스케줄 테이블', url: 'https://docs.google.com/document/d/11ik5wbRJ_5jkQFFwK8zkhQ0oRREKuzH_71Eo-rYCNuE/edit?tab=t.0', icon: 'ph-file-text' },
        { id: 'quick-05', name: '구글 캘린더', desc: '사내 스케줄링 관리 테이블', url: 'https://calendar.google.com', icon: 'ph-calendar-blank' }
      ],
      marketing: [
        { id: 'mark-01', name: 'Google Analytics 4', desc: '클라이언트 웹사이트 로그 분석 및 데이터 트래킹', url: 'https://analytics.google.com', icon: 'ph-trend-up', tags: ['Google', 'Analytics'] },
        { id: 'mark-02', name: 'Search Console', desc: '색인 생성 여부 확인 및 기술 SEO 퍼포먼스 모니터링', url: 'https://search.google.com/search-console', icon: 'ph-google-chrome-logo', tags: ['SEO', 'Console'] },
        { id: 'mark-03', name: '제미나이 (Gemini)', desc: '구글 LLM 콘텐츠 생성 및 코드 분석 가젯', url: 'https://gemini.google.com', icon: 'ph-sparkle', tags: ['AI', 'Marketing'] },
        { id: 'mark-04', name: '챗GPT (ChatGPT)', desc: 'OpenAI 실무 업무 보조 및 프롬프트 기획 툴', url: 'https://chatgpt.com', icon: 'ph-cpu', tags: ['AI', 'Workspace'] }
      ],
      designDev: [
        { id: 'des-01', name: 'Framer', desc: '인터랙티브 웹 디자인 프로토타이핑 및 프로덕션', url: 'https://www.framer.com', icon: 'ph-framer-logo', tags: ['Design', 'Interaction'] },
        { id: 'des-02', name: 'Figma', desc: 'UI/UX 협업 설계 및 전사 컴포넌트 에셋 허브', url: 'https://www.figma.com', icon: 'ph-paint-brush', tags: ['UIUX', 'Asset'] },
        { id: 'des-03', name: 'Envato Elements', desc: '고감도 리소스 및 웹 템플릿 마켓플레이스', url: 'https://elements.envato.com', icon: 'ph-shopping-bag', tags: ['Resource', 'Market'] }
      ],
      operation: [
        { id: 'oper-01', name: '인트라넷', desc: '사내 공지사항 및 업무 매뉴얼 아카이빙 룸', url: '#', icon: 'ph-file-text', tags: ['Internal', 'Daily'] },
        { id: 'oper-02', name: '휴가 메일 작성', desc: '사내 휴가 신청 양식 및 자동 메일 빌더 킷', url: 'https://gloimyasumi.pages.dev/', icon: 'ph-calendar-check', tags: ['Vacation', 'Mail'] },
        { id: 'oper-03', name: '이미지 압축', desc: '웹 최적화 및 SEO 성능 향상을 위한 경량화 툴', url: 'http://gloimroom.gloim.kr/jd-tools/image-compress.html', icon: 'ph-file-zip', tags: ['SEO', 'Tool'] },
        { id: 'oper-04', name: 'Figma To Elementor', desc: 'Figma 디자인 컴포넌트의 가벼운 Elementor/JSON 구조 변환 매니저', url: 'https://lim-jonghyuk.github.io/figma-to-wordpress/', icon: 'ph-vector-three', tags: ['Figma', 'Elementor', 'Atomic'] }
      ]
    };

    let directoryMasterStore = JSON.parse(localStorage.getItem('gloim_dashboard_services'));
    
    if (!directoryMasterStore) {
      directoryMasterStore = { ...factoryDefaultStore };
    } else {
      factoryDefaultStore.operation.forEach(defaultOp => {
        const hasId = directoryMasterStore.operation.some(storedOp => storedOp.id === defaultOp.id);
        if(!hasId) directoryMasterStore.operation.push(defaultOp);
      });
      localStorage.setItem('gloim_dashboard_services', JSON.stringify(directoryMasterStore));
    }

    function saveToLocalStorage() {
      localStorage.setItem('gloim_dashboard_services', JSON.stringify(directoryMasterStore));
    }

    let globalEditingFlag = false;
    let currentTargetCategory = 'quickAccess'; 
    let selectedModalIconClass = 'ph-link';

    /* ==========================================================================
       사이드바 인터랙션 스크립트 : 아코디언 개별 작동 가이드
       ========================================================================== */
    function toggleDashboardAccordion() {
      const groupNode = document.getElementById('dash-accordion-group');
      groupNode.classList.toggle('is-collapsed');
    }

    /* ==========================================================================
       2. 대시보드 동적 렌더링 코어 엔진
       ========================================================================== */
    function renderAllSections() {
      const mappings = [
        { id: 'quick-service-container', key: 'quickAccess', class: 'quick-card' },
        { id: 'marketing-service-container', key: 'marketing', class: 'link-card' },
        { id: 'designdev-service-container', key: 'designDev', class: 'link-card' },
        { id: 'operation-service-container', key: 'operation', class: 'link-card' }
      ];

      mappings.forEach(map => {
        const container = document.getElementById(map.id);
        if(!container) return;
        container.innerHTML = '';
        directoryMasterStore[map.key].forEach(service => {
          container.appendChild(createCardNode(service, map.key, map.class));
        });
        container.appendChild(createPlaceholderNode(map.key, map.class));
      });
    }

    function createCardNode(service, categoryKey, className) {
      const cardWrapper = document.createElement('div');
      cardWrapper.className = className;
      
      if (!globalEditingFlag) {
        cardWrapper.onclick = () => window.open(service.url, '_blank');
      }

      const tagsHtml = service.tags && service.tags.length > 0 ? `
        <div class="card-tags">
          ${service.tags.map(t => `<span class="tag">${t}</span>`).join('')}
        </div>
      ` : '';

      cardWrapper.innerHTML = `
        <div class="card-glow"></div>
        <div class="card-inline-delete-btn" title="서비스 삭제">
          <i class="ph ph-minus-bold"></i>
        </div>
        ${className === 'link-card' ? `
          <div class="card-header">
            <i class="ph ${service.icon} card-icon"></i>
            <i class="ph ph-arrow-square-out link-arrow"></i>
          </div>
          <div class="card-body">
            <h3>${service.name}</h3>
            <p>${service.desc}</p>
          </div>
          ${tagsHtml}
        ` : `
          <div class="quick-icon"><i class="ph ${service.icon}"></i></div>
          <div class="quick-info">
            <h3>${service.name}</h3>
            <p>${service.desc}</p>
          </div>
        `}
      `;
      
      cardWrapper.querySelector('.card-inline-delete-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        eraseCustomService(categoryKey, service.id);
      });

      cardWrapper.addEventListener('mousemove', handleCardGlowEngine);
      return cardWrapper;
    }

    function createPlaceholderNode(categoryKey, className) {
      const addPlaceholderNode = document.createElement('div');
      addPlaceholderNode.className = `${className} add-card-placeholder`;
      addPlaceholderNode.innerHTML = `<i class="ph ph-plus-circle-bold"></i> 서비스 추가`;
      addPlaceholderNode.onclick = (e) => { e.stopPropagation(); openServiceModal(categoryKey); };
      return addPlaceholderNode;
    }

    /* ==========================================================================
       3. 인터랙션 및 시스템 제어 로직
       ========================================================================== */
    function toggleSectionAccordion(sectionId) {
      const targetSection = document.getElementById(sectionId);
      if(!targetSection) return;
      
      const caretIcon = targetSection.querySelector('.accordion-toggle-icon');
      targetSection.classList.toggle('is-collapsed');
      
      if(targetSection.classList.contains('is-collapsed')) {
        caretIcon.className = 'ph ph-caret-right accordion-toggle-icon';
      } else {
        caretIcon.className = 'ph ph-caret-down accordion-toggle-icon';
      }
    }

    function scrollToSection(id) {
      const element = document.getElementById(id);
      if(element) {
        if(element.classList.contains('is-collapsed')) {
          toggleSectionAccordion(id);
        }
        element.scrollIntoView({ behavior: 'smooth' });
      }
    }

    function toggleSystemTheme() {
      const bodyNode = document.body;
      const themeBtn = document.getElementById('theme-toggle-btn');
      const currentTheme = bodyNode.getAttribute('data-theme');

      themeBtn.innerHTML = ''; 
      const iconNode = document.createElement('i');

      if (currentTheme === 'dark') {
        bodyNode.setAttribute('data-theme', 'light');
        iconNode.className = 'ph ph-moon';
      } else {
        bodyNode.setAttribute('data-theme', 'dark');
        iconNode.className = 'ph ph-sun';
      }
      
      themeBtn.appendChild(iconNode);

      if (window.PhosphorIcons && typeof window.PhosphorIcons.render === 'function') {
        window.PhosphorIcons.render();
      }
    }

    function togglePersonalizationMode() {
      globalEditingFlag = !globalEditingFlag;
      const scrollHub = document.getElementById('directory-scroll-hub');
      const toggleBtn = document.getElementById('edit-mode-toggle-trigger');

      if (globalEditingFlag) {
        scrollHub.classList.add('is-editing-mode');
        toggleBtn.classList.add('editing-active');
        toggleBtn.querySelector('span').innerText = '편집 완료';
        
        document.querySelectorAll('.directory-section.is-collapsed').forEach(section => {
          toggleSectionAccordion(section.id);
        });
      } else {
        scrollHub.classList.remove('is-editing-mode');
        toggleBtn.classList.remove('editing-active');
        toggleBtn.querySelector('span').innerText = '서비스 편집';
      }
      renderAllSections();
    }

    function eraseCustomService(categoryKey, id) {
      directoryMasterStore[categoryKey] = directoryMasterStore[categoryKey].filter(s => s.id !== id);
      saveToLocalStorage(); 
      renderAllSections();
    }

    function openServiceModal(categoryKey) {
      currentTargetCategory = categoryKey;
      const tagFormGroup = document.getElementById('modal-tag-input-group');
      if (categoryKey === 'quickAccess') {
        tagFormGroup.style.display = 'none';
      } else {
        tagFormGroup.style.display = 'flex';
      }
      document.getElementById('service-modal').style.display = 'flex';
    }

    function closeServiceModal() {
      document.getElementById('service-modal').style.display = 'none';
      document.getElementById('modal-input-name').value = '';
      document.getElementById('modal-input-desc').value = '';
      document.getElementById('modal-input-url').value = 'https://';
      document.getElementById('modal-input-tags').value = ''; 
    }

    function selectModalIcon(element, iconClass) {
      document.querySelectorAll('.icon-opt').forEach(opt => opt.classList.remove('selected'));
      element.classList.add('selected');
      selectedModalIconClass = iconClass;
    }

    function commitCustomService() {
      const nameVal = document.getElementById('modal-input-name').value.trim();
      const descVal = document.getElementById('modal-input-desc').value.trim();
      const urlVal = document.getElementById('modal-input-url').value.trim();
      const rawTags = document.getElementById('modal-input-tags').value.trim();

      if (!nameVal) {
        alert('서비스 명칭은 필수 입력 대상입니다.');
        return;
      }

      let parsedTagsArray = [];
      if (currentTargetCategory !== 'quickAccess') {
        if (rawTags) {
          parsedTagsArray = rawTags.split(',').map(tag => tag.trim()).filter(tag => tag.length > 0);
        } else {
          parsedTagsArray = ['Custom']; 
        }
      }

      const newServiceObj = {
        id: 'cust-' + Date.now(),
        name: nameVal,
        desc: descVal || '사용자 등록 지정 링크',
        url: urlVal,
        icon: selectedModalIconClass,
        tags: parsedTagsArray
      };

      directoryMasterStore[currentTargetCategory].push(newServiceObj);
      
      saveToLocalStorage(); 
      closeServiceModal();
      renderAllSections();
    }

    /* ==========================================================================
       4. 실시간 메모 모듈
       ========================================================================== */
    let memoDataStore = JSON.parse(localStorage.getItem('gloim_dashboard_memos'));
    if (!memoDataStore) {
      memoDataStore = [
        { id: 1, text: "프로젝트 자동화 마이그레이션 결과 모니터링 세션", completed: false },
        { id: 2, text: "Elementor 단층 컨테이너 경량화 플러그인 테스트 완료", completed: true }
      ];
    }

    function saveMemosToStorage() {
      localStorage.setItem('gloim_dashboard_memos', JSON.stringify(memoDataStore));
    }

    function handleMemoKeydown(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault(); 
        pushLiveMemo();
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('memo-textarea-field').addEventListener('keydown', handleMemoKeydown);
    });

    function renderLiveMemos() {
      const targetContainer = document.getElementById('memo-render-target');
      if(!targetContainer) return;
      targetContainer.innerHTML = '';

      if (memoDataStore.length === 0) {
        targetContainer.innerHTML = `<div class="memo-text-content" style="text-align:center; color: var(--text-muted); padding:16px 0;">등록된 실시간 태스크가 없습니다.</div>`;
        return;
      }

      memoDataStore.forEach(memo => {
        const item = document.createElement('div');
        item.className = `memo-item ${memo.completed ? 'completed' : ''}`;
        const checkIcon = memo.completed ? 'ph-check-square-fill' : 'ph-square';

        item.innerHTML = `
          <div class="memo-left-block">
            <i class="ph ${checkIcon} memo-checkbox"></i>
            <div>
              <p class="memo-text-content">${memo.text}</p>
            </div>
          </div>
          <div class="memo-action-btns">
            <button class="memo-del-btn" title="완전 삭제">
              <i class="ph ph-trash"></i>
            </button>
          </div>
        `;
        
        item.querySelector('.memo-checkbox').addEventListener('click', () => toggleMemoStatus(memo.id));
        item.querySelector('.memo-del-btn').addEventListener('click', () => eraseLiveMemo(memo.id));

        targetContainer.appendChild(item);
      });
    }

    function pushLiveMemo() {
      const textarea = document.getElementById('memo-textarea-field');
      const textVal = textarea.value.trim();
      if (!textVal) return;

      const newMemoNode = { id: Date.now(), text: textVal, completed: false };
      memoDataStore.unshift(newMemoNode);
      textarea.value = '';
      
      saveMemosToStorage(); 
      renderLiveMemos();
    }

    function toggleMemoStatus(id) {
      memoDataStore = memoDataStore.map(memo => {
        if (memo.id === id) return { ...memo, completed: !memo.completed };
        return memo;
      });
      
      saveMemosToStorage(); 
      renderLiveMemos();
    }

    function eraseLiveMemo(id) {
      memoDataStore = memoDataStore.filter(memo => memo.id !== id);
      
      saveMemosToStorage(); 
      renderLiveMemos();
    }

    /* --------------------------------------------------------------------------
       5. 공통 물리 인터랙션 (Glow 및 일자/요일/시간 정밀 캘린더 엔진)
       -------------------------------------------------------------------------- */
    function handleCardGlowEngine(e) {
      const rect = e.currentTarget.getBoundingClientRect();
      const computedX = e.clientX - rect.left;
      const computedY = e.clientY - rect.top;
      e.currentTarget.style.setProperty('--mouse-x', `${computedX}px`);
      e.currentTarget.style.setProperty('--mouse-y', `${computedY}px`);
    }

    function runSystemClock() {
      const dateTarget = document.getElementById('live-date');
      const clockTarget = document.getElementById('live-clock');
      const d = new Date();
      
      const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
      
      const month = d.getMonth() + 1;
      const date = d.getDate();
      const dayOfWeek = dayNames[d.getDay()];
      
      if(dateTarget) dateTarget.innerText = `${month}월 ${date}일(${dayOfWeek})`;

      let hr = d.getHours();
      const min = String(d.getMinutes()).padStart(2, '0');
      const sec = String(d.getSeconds()).padStart(2, '0');
      const amOrPm = hr >= 12 ? 'PM' : 'AM';

      hr = hr % 12 || 12;
      const formattedHr = String(hr).padStart(2, '0');
      if(clockTarget) clockTarget.innerText = `${formattedHr}:${min}:${sec} ${amOrPm}`;
    }

    /* ==========================================================================
       6. 전역 실시간 필터 검색 엔진 (태그 서칭 전면 매핑)
       ========================================================================== */
    document.addEventListener('DOMContentLoaded', () => {
      const searchInput = document.getElementById('search-input');
      if(searchInput) {
        searchInput.addEventListener('input', (e) => {
          const keyword = e.target.value.toLowerCase().trim();
          const cards = document.querySelectorAll('.link-card:not(.add-card-placeholder), .quick-card:not(.add-card-placeholder)');
          
          if (keyword.length > 0) {
            document.querySelectorAll('.directory-section.is-collapsed').forEach(section => {
              toggleSectionAccordion(section.id);
            });
          }
          
          cards.forEach(card => {
            const title = card.querySelector('h3').textContent.toLowerCase();
            const desc = card.querySelector('p').textContent.toLowerCase();
            const tags = card.querySelector('.card-tags') ? Array.from(card.querySelectorAll('.tag')).map(t => t.textContent.toLowerCase()) : [];
            const hasTag = tags.some(tag => tag.includes(keyword));

            if (title.includes(keyword) || desc.includes(keyword) || hasTag) {
              card.style.display = 'flex';
              card.style.opacity = '1';
            } else {
              card.style.display = 'none';
              card.style.opacity = '0';
            }
          });
        });
      }
    });

    setInterval(runSystemClock, 1000);
    runSystemClock();
    renderAllSections();
    renderLiveMemos();
  </script>
</body>
</html>
